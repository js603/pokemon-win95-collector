name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # main 브랜치에 코드가 push될 때 작동합니다.

# 외부 액션 실행 및 Pages 배포 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

# 연속 실행 시 이전 빌드 취소 설정 (중복 빌드 방지)
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 1. 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: 2. Node.js 환경 세팅 (v20)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. 의존성 패키지 설치
        # Vite 8 버전과의 의존성 충돌 방지를 위해 --legacy-peer-deps 옵션을 필수적으로 붙여 설치합니다.
        run: npm ci --legacy-peer-deps

      - name: 4. 프로젝트 빌드 (Vite Production Build)
        run: npm run build

      - name: 5. 빌드 결과물(dist) 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: 6. GitHub Pages로 최종 배포
        id: deployment
        uses: actions/deploy-pages@v4